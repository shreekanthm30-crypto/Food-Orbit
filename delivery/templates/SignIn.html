<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>SignIn page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #fff7f0 0%, #fdeff2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        form {
            background: rgba(255, 250, 245, 0.95);
            padding: 2.5rem 2rem;
            border-radius: 1.5rem;

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #5c4b43;

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.8rem 1rem;
            font-size: 0.95rem;
            font-family: inherit;
            border: 1.5px solid #f3decb;
            border-radius: 1.2rem;
            background: #ffffff;
            transition: all 0.2s ease;
            outline: none;
            color: #2c2a2b;
            margin-bottom: 1rem;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #e07a5f;
            box-shadow: 0 0 0 3px rgba(224, 122, 95, 0.08);
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: #cfbcaf;

            width: 100%;
            padding: 0.8rem;
            background: #f7d6c5;
            color: #b05c3c;
            border: 1px solid #ffe0cf;
            border-radius: 2rem;
            font-size: 1rem;

            border-color: #f7bc98;
        }

            display: none;
        }

            display: none;
        }

</head>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Orbit - Sign In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #2e7d32;
            --light-green: #4caf50;
            --soft-green: #e8f5e9;
            --white: #ffffff;
            --beige: #f5f5dc;
            --warm-beige: #e8e0c8;
            --dark-beige: #d4c5a0;
            --deep-beige: #c2b28b;
            --shadow-sm: 0 10px 30px rgba(46, 125, 50, 0.1);
            --shadow-md: 0 20px 40px rgba(46, 125, 50, 0.15);
            --shadow-lg: 0 30px 60px rgba(46, 125, 50, 0.2);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--beige) 0%, var(--warm-beige) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background decorations */
        body::before {
            content: '🍔';
            position: absolute;
            font-size: 100px;
            opacity: 0.05;
            top: 10%;
            left: -50px;
            animation: floatLeft 20s ease-in-out infinite;
        }

        body::after {
            content: '🍕';
            position: absolute;
            font-size: 120px;
            opacity: 0.05;
            bottom: 10%;
            right: -50px;
            animation: floatRight 25s ease-in-out infinite;
        }

        @keyframes floatLeft {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, 20px) rotate(10deg); }
        }

        @keyframes floatRight {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-30px, -20px) rotate(-10deg); }
        }

        /* Floating circles background */
        .bg-circle {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(76, 175, 80, 0.08) 0%, rgba(76, 175, 80, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        .bg-circle-1 {
            width: 300px;
            height: 300px;
            top: -150px;
            right: -150px;
            animation: float 20s ease-in-out infinite;
        }

        .bg-circle-2 {
            width: 400px;
            height: 400px;
            bottom: -200px;
            left: -200px;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 15px); }
        }

        form {
            background: var(--white);
            padding: 2.8rem 2.5rem;
            border-radius: 2rem;
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            backdrop-filter: blur(0px);
        }

        form:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Food Orbit Logo/Header */
        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            display: inline-block;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .form-title {
            font-size: 1.8rem;
            color: var(--primary-green);
            font-weight: 700;
            margin-bottom: 0.3rem;
            background: linear-gradient(135deg, var(--primary-green), var(--light-green));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-subtitle {
            font-size: 0.85rem;
            color: var(--deep-beige);
            letter-spacing: 1px;
        }

        .divider {
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, var(--light-green), var(--primary-green));
            margin: 0.8rem auto 0;
            border-radius: 2px;
            animation: expandWidth 0.8s ease-out;
        }

        @keyframes expandWidth {
            from { width: 0; opacity: 0; }
            to { width: 50px; opacity: 1; }
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-green);
            margin-bottom: 0.5rem;
            margin-top: 0.5rem;
            transition: color 0.3s ease;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.2rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.9rem 1rem;
            font-size: 0.95rem;
            font-family: inherit;
            border: 2px solid var(--warm-beige);
            border-radius: 1rem;
            background: var(--white);
            transition: all 0.3s ease;
            outline: none;
            color: #4a3b32;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--light-green);
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.1);
            transform: translateY(-1px);
        }

        input[type="text"]:hover,
        input[type="password"]:hover {
            border-color: var(--dark-beige);
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: var(--dark-beige);
            font-size: 0.85rem;
        }

        /* Password toggle feature */
        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 1.1rem;
            opacity: 0.6;
            transition: opacity 0.3s ease;
            user-select: none;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        input[type="submit"] {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--primary-green), var(--light-green));
            color: var(--white);
            border: none;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
        }

        input[type="submit"]::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        input[type="submit"]:hover::before {
            width: 300px;
            height: 300px;
        }

        input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.3);
        }

        input[type="submit"]:active {
            transform: translateY(0);
        }

        /* Additional links */
        .form-footer {
            text-align: center;
            margin-top: 1.8rem;
            padding-top: 1rem;
            border-top: 1px solid var(--warm-beige);
        }

        .signup-link {
            color: var(--deep-beige);
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .signup-link:hover {
            color: var(--primary-green);
            transform: translateX(3px);
        }

        .back-home {
            display: inline-block;
            margin-top: 0.8rem;
            color: var(--dark-beige);
            font-size: 0.8rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-home:hover {
            color: var(--light-green);
        }

        /* Error message styling (if any) */
        .error-message {
            background: #fee;
            color: #c62828;
            padding: 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            text-align: center;
            animation: shake 0.5s ease-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            
            form {
                padding: 2rem 1.5rem;
                max-width: 100%;
            }
            
            .form-title {
                font-size: 1.5rem;
            }
            
            .logo-icon {
                font-size: 2.5rem;
            }
            
            input[type="text"],
            input[type="password"],
            input[type="submit"] {
                padding: 0.75rem;
            }
        }

        /* Loading animation for page */
        @keyframes pageLoad {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        body {
            animation: pageLoad 0.5s ease-out;
        }

        /* Focus visible for accessibility */
        input:focus-visible {
            outline: 2px solid var(--primary-green);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    
    <form method='POST' action={% url 'signin' %}>
        {% csrf_token %}
        
        <div class="form-header">
            <div class="logo-icon">🍽️✨</div>
            <div class="form-title">Welcome Back!</div>
            <div class="form-subtitle">Sign in to continue</div>
            <div class="divider"></div>
        </div>
        
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username">
        </div>
        
        <div class="input-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
                <input type="password" name="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                <span class="toggle-password" onclick="togglePassword()">👁️</span>
            </div>
        </div>
        
        <input type="submit" value="Sign In →">
        
        <div class="form-footer">
            <a href="/SignUp" class="signup-link">Don't have an account? Sign up →</a><br>
            <a href="/" class="back-home">← Back to Home</a>
        </div>
    </form>

    <script>
        // Password visibility toggle
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }
    </script>
</body>
</html>
