<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Orbit - Restaurant Deleted</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #2e7d32;
            --light-green: #4caf50;
            --white: #ffffff;
            --beige: #f5f5dc;
            --warm-beige: #e8e0c8;
            --dark-beige: #d4c5a0;
            --deep-beige: #c2b28b;
            --delete-red: #d32f2f;
            --delete-light: #ffebee;
            --shadow-sm: 0 10px 30px rgba(46, 125, 50, 0.1);
            --shadow-md: 0 20px 40px rgba(46, 125, 50, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--beige) 0%, var(--warm-beige) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            animation: fadeIn 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Animated background elements */
        body::before {
            content: '🗑️';
            position: absolute;
            font-size: 150px;
            opacity: 0.04;
            top: -50px;
            right: -50px;
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
        }

        body::after {
            content: '⚠️';
            position: absolute;
            font-size: 120px;
            opacity: 0.04;
            bottom: -30px;
            left: -30px;
            animation: float 25s ease-in-out infinite reverse;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, 20px) rotate(10deg); }
        }

        .container {
            background: var(--white);
            padding: 3rem 2rem;
            border-radius: 2rem;
            box-shadow: var(--shadow-md);
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Delete icon */
        .delete-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--delete-red), #ff6b6b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            animation: scaleIn 0.5s ease-out 0.3s both;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .delete-mark {
            font-size: 3rem;
            animation: shake 0.5s ease-out 0.5s both;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        h3 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            animation: fadeInUp 0.5s ease-out 0.2s both;
        }

        .delete-text {
            color: var(--delete-red);
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-box {
            background: var(--delete-light);
            padding: 1rem;
            border-radius: 1rem;
            margin: 1.5rem 0;
            border-left: 4px solid var(--delete-red);
            animation: fadeInUp 0.5s ease-out 0.3s both;
        }

        .message-box p {
            color: var(--delete-red);
            font-size: 1rem;
            font-weight: 500;
        }

        .warning-icon {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--delete-red), #ff8a80);
            margin: 1rem auto;
            border-radius: 3px;
            animation: expandWidth 0.8s ease-out 0.4s both;
        }

        @keyframes expandWidth {
            from { width: 0; opacity: 0; }
            to { width: 60px; opacity: 1; }
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
            flex-wrap: wrap;
            animation: fadeInUp 0.5s ease-out 0.4s both;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-home {
            background: linear-gradient(135deg, var(--primary-green), var(--light-green));
            color: var(--white);
        }

        .btn-admin {
            background: var(--beige);
            color: var(--primary-green);
            border: 2px solid var(--light-green);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            
            .container {
                padding: 2rem 1.5rem;
            }
            
            h3 {
                font-size: 1.5rem;
            }
            
            .delete-icon {
                width: 80px;
                height: 80px;
            }
            
            .delete-mark {
                font-size: 2.5rem;
            }
            
            .btn {
                padding: 0.6rem 1.2rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="delete-icon">
            <div class="delete-mark">🗑️</div>
        </div>
        
        <h3>
            Restaurant <span class="delete-text">Deleted</span>
        </h3>
        <div class="divider"></div>
        
        <div class="message-box">
            <span class="warning-icon">⚠️</span>
            <p>The restaurant has been successfully removed from the system.</p>
        </div>
        
        <div class="btn-group">
            <a href="/" class="btn btn-home">🏠 Go to Home</a>
            <a href="/admin" class="btn btn-admin">📋 Admin Panel</a>
        </div>
    </div>
</body>
</html>
