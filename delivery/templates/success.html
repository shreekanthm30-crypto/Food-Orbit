<!DOCTYPE html>
<html>
<head>
    <title>Food Orbit - Login Success</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-green: #2e7d32;
            --light-green: #4caf50;
            --white: #ffffff;
            --beige: #f5f5dc;
            --warm-beige: #e8e0c8;
            --dark-beige: #d4c5a0;
            --deep-beige: #c2b28b;
            --shadow-sm: 0 10px 30px rgba(46, 125, 50, 0.1);
            --shadow-md: 0 20px 40px rgba(46, 125, 50, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--beige) 0%, var(--warm-beige) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            animation: fadeIn 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Animated background elements */
        body::before {
            content: '🎉';
            position: absolute;
            font-size: 150px;
            opacity: 0.05;
            top: -50px;
            right: -50px;
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
        }

        body::after {
            content: '🍽️';
            position: absolute;
            font-size: 120px;
            opacity: 0.05;
            bottom: -30px;
            left: -30px;
            animation: float 25s ease-in-out infinite reverse;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, 20px) rotate(10deg); }
        }

        /* Confetti animation */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--light-green);
            position: absolute;
            animation: confetti 3s ease-in-out infinite;
        }

        @keyframes confetti {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .container {
            background: var(--white);
            padding: 3rem 2rem;
            border-radius: 2rem;
            box-shadow: var(--shadow-md);
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Success icon */
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary-green), var(--light-green));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            animation: scaleIn 0.5s ease-out 0.3s both;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .checkmark {
            font-size: 3rem;
            animation: bounce 0.5s ease-out 0.5s both;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        h1 {
            color: var(--primary-green);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary-green), var(--light-green));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInUp 0.5s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-message {
            background: var(--beige);
            padding: 1rem;
            border-radius: 1rem;
            margin: 1.5rem 0;
            animation: fadeInUp 0.5s ease-out 0.3s both;
        }

        .welcome-message p {
            color: var(--primary-green);
            font-size: 1.1rem;
            font-weight: 500;
        }

        .user-name {
            font-weight: 700;
            color: var(--light-green);
            font-size: 1.2rem;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--light-green), var(--primary-green));
            margin: 1rem auto;
            border-radius: 3px;
            animation: expandWidth 0.8s ease-out 0.4s both;
        }

        @keyframes expandWidth {
            from { width: 0; opacity: 0; }
            to { width: 60px; opacity: 1; }
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 2rem;
            background: linear-gradient(135deg, var(--primary-green), var(--light-green));
            color: var(--white);
            text-decoration: none;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out 0.4s both;
        }

        .btn-home::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-home:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(46, 125, 50, 0.3);
        }

        .btn-home:active {
            transform: translateY(0);
        }

        /* Quick actions */
        .quick-actions {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.5s ease-out 0.5s both;
        }

        .quick-link {
            color: var(--deep-beige);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            background: var(--beige);
        }

        .quick-link:hover {
            color: var(--primary-green);
            background: var(--warm-beige);
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            
            .container {
                padding: 2rem 1.5rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .success-icon {
                width: 80px;
                height: 80px;
            }
            
            .checkmark {
                font-size: 2.5rem;
            }
            
            .welcome-message p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <div class="checkmark">✓</div>
        </div>
        
        <h1>Login Successful 🎉</h1>
        <div class="divider"></div>
        
        <div class="welcome-message">
            <p>Welcome, <span class="user-name">{{ user.name }}</span>!</p>
        </div>
        
        <a href="/" class="btn-home">🏠 Go to Home</a>
        
        <div class="quick-actions">
            <a href="/restaurants" class="quick-link">Browse Restaurants →</a>
            <a href="/profile" class="quick-link">My Profile →</a>
        </div>
    </div>
</body>
</html>
